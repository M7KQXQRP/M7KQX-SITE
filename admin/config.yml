backend:
  name: git-gateway
  branch: master

media_folder: "static/img"
public_folder: "/img"

collections:
  - name: "radio-log"
    label: "Radio Operations Log"
    folder: "tags/blog" # Keeps the folder path synced with the theme's default logic
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{title}}"
    editor:
      preview: false
    fields:
      - { label: "Layout", name: "layout", widget: "hidden", default: "layouts/post.njk" }
      - { label: "Log Title / Call Sign Worked", name: "title", widget: "string", description: "e.g., Working EA7/M7XXX from a local park or 10m Band Opening" }
      - { label: "Date of Operation", name: "date", widget: "datetime" }
      - { label: "Band / Frequency", name: "band", widget: "select", options: ["10m (28MHz)", "15m (21MHz)", "20m (14MHz)", "40m (7MHz)", "VHF/UHF"], default: "10m (28MHz)" }
      - { label: "Power Output (Watts)", name: "power", widget: "string", default: "5W (QRP)" }
      - { label: "Antenna Type Used", name: "antenna", widget: "string", placeholder: "e.g., Homebrew 10m Vertical Dipole / EFHW" }
      - { label: "Featured Station Photo", name: "featuredImage", widget: "image", required: false }
      - { label: "Tags / Categories", name: "tags", widget: "list", default: ["Radio Log", "QRP"] }
      - { label: "Operation Details & Log Entry", name: "body", widget: "markdown" }